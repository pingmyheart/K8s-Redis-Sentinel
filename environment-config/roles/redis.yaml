apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: redis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-role
  namespace: redis
rules:
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "list", "watch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-binding
  namespace: redis
subjects:
  - kind: ServiceAccount
    name: redis-sa
roleRef:
  kind: Role
  name: redis-role
  apiGroup: rbac.authorization.k8s.io